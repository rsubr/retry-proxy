name: Secret Scan

on:
  push:

permissions:
  contents: read

jobs:
  kingfisher:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kingfisher
        run: |
          LATEST=$(curl -sSf https://api.github.com/repos/mongodb/kingfisher/releases/latest | jq -r '.tag_name')
          curl -sSfL "https://github.com/mongodb/kingfisher/releases/download/${LATEST}/kingfisher-linux-x64.tgz" \
            | sudo tar -xz -C /usr/local/bin kingfisher

      - name: Scan for secrets
        run: kingfisher scan --git-history full .
